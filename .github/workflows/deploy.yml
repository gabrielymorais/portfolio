name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: portfolio/package-lock.json

      - name: Install dependencies
        working-directory: ./portfolio
        run: npm ci

      - name: Build Angular
        working-directory: ./portfolio
        run: npx ng build --configuration production --base-href /portfolio/

      - name: Find build output
        id: find-dist
        run: |
          if [ -d "portfolio/dist/browser" ]; then
            echo "path=portfolio/dist/browser" >> $GITHUB_OUTPUT
          else
            first_dir=$(find portfolio/dist -mindepth 1 -maxdepth 1 -type d | head -n 1)
            if [ -d "$first_dir/browser" ]; then
              echo "path=$first_dir/browser" >> $GITHUB_OUTPUT
            else
              echo "path=$first_dir" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.find-dist.outputs.path }}

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
