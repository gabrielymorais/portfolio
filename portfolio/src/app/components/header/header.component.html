<header class="header">
  <div class="container header__container">
    <a href="#hero" class="header__logo">
      <span class="gradient-text">&lt;G/&gt;</span>
      <span class="header__logo-text">Gabriely</span>
    </a>

    <!-- Hamburger Menu Icon -->
    <div class="header__hamburger" (click)="toggleMenu()" [class.active]="menuOpen">
      <span></span>
      <span></span>
      <span></span>
    </div>

    <nav class="header__nav" [class.active]="menuOpen">
      <ul>
        <li *ngFor="let link of navLinks">
          <a (click)="scrollTo(link.href)" style="cursor: pointer;">{{ link.label }}</a>
        </li>
      </ul>
    </nav>

    <div class="header__actions">
      <a href="#contact" class="btn btn--primary">Contato</a>
    </div>
  </div>
</header>
